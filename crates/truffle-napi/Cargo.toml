[package]
name = "truffle-napi"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
truffle-core = { path = "../truffle-core" }
napi = { version = "3", features = ["async", "napi4", "tokio_rt", "serde-json"] }
napi-derive = "3"
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"

[build-dependencies]
napi-build = "2"
