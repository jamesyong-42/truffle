[package]
name = "truffle-cli"
version = "0.1.0"
edition = "2021"
description = "CLI tool for Truffle mesh networking"
license = "MIT"
repository = "https://github.com/jamesyong-42/truffle"
publish = false

[[bin]]
name = "truffle"
path = "src/main.rs"

[dependencies]
truffle-core = { path = "../truffle-core" }
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
