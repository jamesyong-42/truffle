[package]
name = "truffle-cli"
version = "0.1.0"
edition = "2021"
description = "CLI tool for Truffle mesh networking"
license = "MIT"
repository = "https://github.com/jamesyong-42/truffle"
publish = false

[[bin]]
name = "truffle"
path = "src/main.rs"

[dependencies]
truffle-core = { path = "../truffle-core" }
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "net", "io-util", "io-std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
dirs = "5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
hostname = "0.4"
libc = "0.2"

[dev-dependencies]
tempfile = "3"
