name: NAPI Build

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              cd crates/truffle-napi
              npx napi build --platform --release --target aarch64-apple-darwin
              strip -x *.node

          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              cd crates/truffle-napi
              npx napi build --platform --release --target x86_64-apple-darwin
              strip -x *.node

          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              cd crates/truffle-napi
              npx napi build --platform --release --target x86_64-unknown-linux-gnu
              strip *.node

          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: |
              cd crates/truffle-napi
              npx napi build --platform --release --target aarch64-unknown-linux-gnu
              aarch64-linux-gnu-strip *.node

          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: |
              cd crates/truffle-napi
              npx napi build --platform --release --target x86_64-pc-windows-msvc

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      # pnpm must be on PATH before setup-node@v5, which auto-validates
      # the `packageManager` field in package.json and fails if the named
      # manager is missing. We also disable `package-manager-cache` because
      # this job uses `npm install`, not pnpm — leaving the auto-cache on
      # causes the post-step to fail when the pnpm store path doesn't exist.
      - name: Install pnpm
        run: npm install -g pnpm@10.20.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: |
          cd crates/truffle-napi
          npm install

      - name: Build native addon
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: bindings-${{ matrix.settings.target }}
          # index.js/index.d.ts are generated by `napi build` and embed the
          # package version; ship them so the test + publish jobs use the
          # freshly-generated copies (index.js is gitignored, not committed).
          path: |
            crates/truffle-napi/*.node
            crates/truffle-napi/index.js
            crates/truffle-napi/index.d.ts
          if-no-files-found: error

  test:
    name: Test bindings
    needs: build
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Install pnpm
        run: npm install -g pnpm@10.20.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: |
          cd crates/truffle-napi
          npm install

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/truffle-napi

      - name: Test bindings
        run: |
          cd crates/truffle-napi
          node -e "const m = require('./index.js'); console.log('Native addon loaded successfully. Exports:', Object.keys(m))"

  publish:
    name: Publish to npm
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Install pnpm
        run: npm install -g pnpm@10.20.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: 24
          # This job uses `npm install` under crates/truffle-napi, not pnpm,
          # so disable auto-cache to avoid post-step path validation errors.
          package-manager-cache: false

      - name: Print npm version
        run: |
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: |
          cd crates/truffle-napi
          npm install

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: crates/truffle-napi/artifacts

      - name: Move artifacts
        run: |
          cd crates/truffle-napi
          npx napi artifacts

      # Sync platform package.json versions to match the main package.
      # napi prepublish would normally do this, but we skip it because it
      # runs child `npm publish` calls that don't inherit OIDC context.
      - name: Sync platform package versions
        run: |
          cd crates/truffle-napi
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing platform packages to $VERSION"
          for pkg in npm/*/; do
            (cd "$pkg" && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done

      # Publish each platform package individually with --provenance.
      # We skip the main package's prepublishOnly hook (napi prepublish)
      # because it runs child npm publish calls that don't inherit OIDC context.
      - name: Publish platform packages
        run: |
          for pkg in crates/truffle-napi/npm/*/; do
            echo "Publishing $(basename $pkg)..."
            (cd "$pkg" && npm publish --provenance --access public --registry https://registry.npmjs.org)
          done

      # index.js/index.d.ts are generated + gitignored. Restore the freshly
      # built copies (version-correct for this release) from any build
      # artifact — they are identical across targets — so the main package
      # always publishes with a matching loader. Fail fast if absent rather
      # than publish a package missing its `main` entry point.
      - name: Restore generated bindings from artifact
        run: |
          cd crates/truffle-napi
          src=$(ls -d artifacts/bindings-*/ 2>/dev/null | head -n1)
          if [ -z "$src" ] || [ ! -f "${src}index.js" ] || [ ! -f "${src}index.d.ts" ]; then
            echo "::error::No generated index.js/index.d.ts in build artifacts; refusing to publish."
            exit 1
          fi
          cp "${src}index.js" "${src}index.d.ts" .
          echo "Restored index.js/index.d.ts from ${src}"

      - name: Publish main package
        run: |
          cd crates/truffle-napi
          npm publish --provenance --access public --registry https://registry.npmjs.org --ignore-scripts
