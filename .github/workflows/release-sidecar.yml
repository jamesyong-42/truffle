name: Release Sidecar Binaries

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset: tsnet-sidecar-darwin-arm64
            npm_pkg: truffle-sidecar-darwin-arm64
            bin_name: sidecar-slim
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset: tsnet-sidecar-darwin-amd64
            npm_pkg: truffle-sidecar-darwin-x64
            bin_name: sidecar-slim
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: tsnet-sidecar-linux-amd64
            npm_pkg: truffle-sidecar-linux-x64
            bin_name: sidecar-slim
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset: tsnet-sidecar-linux-arm64
            npm_pkg: truffle-sidecar-linux-arm64
            bin_name: sidecar-slim
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            asset: tsnet-sidecar-windows-amd64.exe
            npm_pkg: truffle-sidecar-win32-x64
            bin_name: sidecar-slim.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build sidecar
        working-directory: packages/sidecar-slim
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w -X main.Version=${{ github.ref_name }}" \
            -o "${{ matrix.asset }}" .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "packages/sidecar-slim/${{ matrix.asset }}" \
            --clobber

      - name: Prepare npm package
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp packages/sidecar-slim/${{ matrix.asset }} npm/${{ matrix.npm_pkg }}/bin/${{ matrix.bin_name }}
          chmod +x npm/${{ matrix.npm_pkg }}/bin/${{ matrix.bin_name }} || true

      - name: Upload npm package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}
          if-no-files-found: error

  publish-npm:
    name: Publish sidecar packages to npm
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Install pnpm
        run: npm install -g pnpm@10.20.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Print npm version
        run: |
          echo "npm version: $(npm --version)"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Set version from tag
        run: |
          # Handle both "v0.2.3" and "truffle-v0.2.3" tag formats
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG##*v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish platform packages
        run: |
          for pkg in artifacts/truffle-sidecar-*; do
            PKG_NAME=$(basename "$pkg")
            # Merge built binary into package source
            cp -r "$pkg/bin" "npm/$PKG_NAME/"
            # Re-apply the executable bit. The build job chmods +x before
            # uploading, but actions/upload-artifact does not preserve POSIX
            # mode bits, so by the time we read the artifact here the bit is
            # gone. If we publish as-is, consumers on macOS/Linux get
            # "Permission denied" when the sidecar is spawned.
            chmod +x "npm/$PKG_NAME/bin/"* || true
            # Update version in package.json
            cd "npm/$PKG_NAME"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm publish --provenance --access public --registry https://registry.npmjs.org
            cd ../..
            echo "Published @vibecook/$PKG_NAME@$VERSION"
          done
