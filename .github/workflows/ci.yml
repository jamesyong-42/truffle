name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  cargo-test:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build Go sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: mkdir -p bin && go build -ldflags "-s -w" -o bin/sidecar-slim .

      - name: Build Go sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: |
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          go build -ldflags "-s -w" -o bin/sidecar-slim.exe .

      - name: Cargo test
        run: cargo test --workspace
