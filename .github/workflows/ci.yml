name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Install pnpm
        run: npm install -g pnpm@10.20.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Release version consistency
        # A release PR cannot contain checksums for binaries that do not exist
        # until after its tag is built. Release publishing uses the strict mode.
        run: node scripts/check-release-versions.mjs --allow-missing-checksums

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  cargo-lint:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Locked dependency graph
        run: cargo metadata --locked --no-deps --format-version 1

      - name: Rustfmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --exclude truffle-tauri-plugin --exclude truffle-napi -- -D warnings

      - name: Doc warnings
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked --no-deps --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

  cargo-deny:
    name: Supply-chain security (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - uses: EmbarkStudios/cargo-deny-action@v2

  cargo-test:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Install Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build Go sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: mkdir -p bin && go build -ldflags "-s -w" -o bin/sidecar-slim .

      - name: Build Go sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: |
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          go build -ldflags "-s -w" -o bin/sidecar-slim.exe .

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cargo test
        run: cargo nextest run --locked --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

      - name: Doc tests
        run: cargo test --locked --doc --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

      - name: Transport stress tests
        if: runner.os == 'Linux'
        run: cargo test --locked -p truffle-core --test integration_transport -- --ignored --test-threads=1

      # Compile-check the tier-1 micro benchmarks from RFC 019. We don't run
      # them here (wall-clock benches on hosted runners are noisy), just
      # catch API drift. Negligible cost thanks to the rust-cache above.
      # Linux-only: benches don't differ by OS and building on three
      # runners triples the time for no new signal.
      - name: Bench compile-check
        if: runner.os == 'Linux'
        run: cargo bench --locked -p truffle-core --no-run
