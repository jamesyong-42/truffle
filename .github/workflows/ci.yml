name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  cargo-lint:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

      - name: Doc warnings
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

  cargo-test:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Go toolchain
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build Go sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: mkdir -p bin && go build -ldflags "-s -w" -o bin/sidecar-slim .

      - name: Build Go sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: |
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          go build -ldflags "-s -w" -o bin/sidecar-slim.exe .

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cargo test
        run: cargo nextest run --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

      - name: Doc tests
        run: cargo test --doc --workspace --exclude truffle-tauri-plugin --exclude truffle-napi
