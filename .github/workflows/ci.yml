name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  cargo-lint:
    name: Rust lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2

      - name: Rustfmt
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

      - name: Doc warnings
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

  cargo-deny:
    name: Supply-chain security (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5

      - uses: EmbarkStudios/cargo-deny-action@v2

  cargo-test:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2

      - name: Install Go toolchain
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: '1.25'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build Go sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: mkdir -p bin && go build -ldflags "-s -w" -o bin/sidecar-slim .

      - name: Build Go sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: |
          if (!(Test-Path bin)) { New-Item -ItemType Directory -Path bin }
          go build -ldflags "-s -w" -o bin/sidecar-slim.exe .

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cargo test
        run: cargo nextest run --workspace --exclude truffle-tauri-plugin --exclude truffle-napi

      - name: Doc tests
        run: cargo test --doc --workspace --exclude truffle-tauri-plugin --exclude truffle-napi
