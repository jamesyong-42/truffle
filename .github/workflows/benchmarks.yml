name: Benchmarks (nightly + on-demand)

# Runs the tier-2 macro benchmarks from RFC 019 against a real Tailscale
# tailnet, uploads JSON reports as artefacts. Triggered nightly on a cron
# and manually via the Actions UI.
#
# Numbers collected here are *directional* on hosted runners due to
# noisy-neighbor variance (±20-40%). For absolute numbers, RFC 023 will
# add a dedicated self-hosted runner.

on:
  schedule:
    # Daily at 06:00 UTC (late evening Americas, early morning EU).
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      file_transfer_size:
        description: 'File transfer payload size (e.g. 1M, 10M, 100M)'
        required: false
        default: '10M'
      synced_store_ops:
        description: 'SyncedStore operation count'
        required: false
        default: '1000'
      request_reply_count:
        description: 'Request/reply round trip count'
        required: false
        default: '500'

permissions:
  contents: read

concurrency:
  # One benchmark run at a time — they share the CI tailnet's device pool.
  group: benchmarks
  cancel-in-progress: false

jobs:
  macro:
    name: Macro benchmark suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRUFFLE_TEST_AUTHKEY: ${{ secrets.TRUFFLE_TEST_AUTHKEY }}
      TRUFFLE_TEST_LOG: "truffle_core=info"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Preflight — refuse to run without auth key
        run: |
          if [ -z "${TRUFFLE_TEST_AUTHKEY:-}" ]; then
            echo "::error::TRUFFLE_TEST_AUTHKEY is not set. Benchmarks require a real tailnet."
            echo "::error::Configure the secret at: Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          shared-key: cargo-test

      - name: Install Go toolchain
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build truffle-bench in release mode
        run: cargo build -p truffle-bench --release

      - name: File transfer
        run: |
          SIZE="${{ github.event.inputs.file_transfer_size || '10M' }}"
          cargo run -p truffle-bench --release -- \
            file-transfer --size "$SIZE" --iterations 5 --warmup 1

      - name: SyncedStore B1 (sequential)
        run: |
          OPS="${{ github.event.inputs.synced_store_ops || '1000' }}"
          cargo run -p truffle-bench --release -- \
            synced-store --scenario b1-sequential --ops "$OPS"

      - name: SyncedStore B2 (concurrent)
        run: |
          OPS="${{ github.event.inputs.synced_store_ops || '1000' }}"
          # Halve B2 ops vs B1 — both sides write concurrently so we double
          # the combined workload anyway.
          cargo run -p truffle-bench --release -- \
            synced-store --scenario b2-concurrent --ops "$((OPS / 2))"

      - name: Request/reply RTT
        run: |
          COUNT="${{ github.event.inputs.request_reply_count || '500' }}"
          cargo run -p truffle-bench --release -- \
            request-reply --count "$COUNT" --payload-bytes 1024

      - name: Summarise results
        if: always()
        run: |
          echo "## Bench results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -d target/bench-results ]; then
            for f in target/bench-results/*.json; do
              [ -f "$f" ] || continue
              echo "── $(basename "$f") ──" >> $GITHUB_STEP_SUMMARY
              if command -v jq >/dev/null 2>&1; then
                jq -r '
                  "workload: \(.workload)",
                  "git_sha:  \(.git_sha // "n/a")",
                  "params:   \(.params | tostring)",
                  "results:  \(.results | tostring)"
                ' "$f" >> $GITHUB_STEP_SUMMARY
              else
                cat "$f" >> $GITHUB_STEP_SUMMARY
              fi
              echo "" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "(no results written — all benches failed)" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_id }}
          path: target/bench-results/
          retention-days: 30
          if-no-files-found: warn
