name: Publish to crates.io

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go toolchain
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build Go sidecar (needed for truffle-core compilation)
        working-directory: packages/sidecar-slim
        run: |
          go build -o sidecar-slim .

      - name: Verify crate versions match
        run: |
          CORE_VER=$(grep '^version' crates/truffle-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SIDECAR_VER=$(grep '^version' crates/truffle-sidecar/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TRUFFLE_VER=$(grep '^version' crates/truffle/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "truffle-core: $CORE_VER"
          echo "truffle-sidecar: $SIDECAR_VER"
          echo "truffle: $TRUFFLE_VER"
          if [ "$CORE_VER" != "$SIDECAR_VER" ] || [ "$CORE_VER" != "$TRUFFLE_VER" ]; then
            echo "::error::Version mismatch! All publishable crates must have the same version."
            exit 1
          fi

      # Obtain a short-lived crates.io token via OIDC (trusted publishing)
      # No secrets needed — the token is exchanged from GitHub's OIDC provider.
      # Requires trusted publisher configured on crates.io for each crate.
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth

      # Publish in dependency order: truffle-core → truffle-sidecar → truffle
      - name: Publish truffle-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          cargo publish --package truffle-core || echo "::warning::truffle-core publish failed or already published"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish truffle-sidecar
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          cargo publish --package truffle-sidecar || echo "::warning::truffle-sidecar publish failed or already published"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish truffle
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          cargo publish --package truffle || echo "::warning::truffle publish failed or already published"
