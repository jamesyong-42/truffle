name: Publish to crates.io

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go toolchain
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Pin checksums for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME##*v}"
          mkdir -p /tmp/sidecar-assets
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --pattern 'tsnet-sidecar-*' \
            --dir /tmp/sidecar-assets
          node scripts/update-sidecar-checksums.mjs "${VERSION}" /tmp/sidecar-assets
          node scripts/check-release-versions.mjs

      - name: Build Go sidecar (needed for truffle-core compilation)
        working-directory: packages/sidecar-slim
        run: |
          go build -o sidecar-slim .

      - name: Verify crate versions match
        run: |
          CORE_VER=$(grep '^version' crates/truffle-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SIDECAR_VER=$(grep '^version' crates/truffle-sidecar/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TRUFFLE_VER=$(grep '^version' crates/truffle/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "truffle-core: $CORE_VER"
          echo "truffle-sidecar: $SIDECAR_VER"
          echo "truffle: $TRUFFLE_VER"
          if [ "$CORE_VER" != "$SIDECAR_VER" ] || [ "$CORE_VER" != "$TRUFFLE_VER" ]; then
            echo "::error::Version mismatch! All publishable crates must have the same version."
            exit 1
          fi
          echo "VERSION=$CORE_VER" >> "$GITHUB_ENV"

      # Obtain a short-lived crates.io token via OIDC (trusted publishing)
      # No secrets needed — the token is exchanged from GitHub's OIDC provider.
      # Requires trusted publisher configured on crates.io for each crate.
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth

      # Publish in dependency order: truffle-core → truffle-sidecar → truffle
      - name: Publish truffle-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          if ! HTTP_STATUS=$(curl --silent --show-error --output /tmp/crate-response --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/truffle-core/${VERSION}"); then
            cat /tmp/crate-response >&2
            exit 1
          fi
          case "$HTTP_STATUS" in
            200) echo "truffle-core ${VERSION} is already published; skipping." ;;
            404) cargo publish --locked --package truffle-core ;;
            *)
              cat /tmp/crate-response >&2
              echo "::error::crates.io lookup returned HTTP ${HTTP_STATUS}; refusing to publish blindly."
              exit 1
              ;;
          esac

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish truffle-sidecar
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          if ! HTTP_STATUS=$(curl --silent --show-error --output /tmp/crate-response --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/truffle-sidecar/${VERSION}"); then
            cat /tmp/crate-response >&2
            exit 1
          fi
          case "$HTTP_STATUS" in
            200) echo "truffle-sidecar ${VERSION} is already published; skipping." ;;
            404) cargo publish --locked --package truffle-sidecar ;;
            *)
              cat /tmp/crate-response >&2
              echo "::error::crates.io lookup returned HTTP ${HTTP_STATUS}; refusing to publish blindly."
              exit 1
              ;;
          esac

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish truffle
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          if ! HTTP_STATUS=$(curl --silent --show-error --output /tmp/crate-response --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/truffle/${VERSION}"); then
            cat /tmp/crate-response >&2
            exit 1
          fi
          case "$HTTP_STATUS" in
            200) echo "truffle ${VERSION} is already published; skipping." ;;
            404) cargo publish --locked --package truffle ;;
            *)
              cat /tmp/crate-response >&2
              echo "::error::crates.io lookup returned HTTP ${HTTP_STATUS}; refusing to publish blindly."
              exit 1
              ;;
          esac
