name: Publish @vibecook/truffle to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish @vibecook/truffle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Print npm version
        run: |
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate fresh index.d.ts and index.js from the Rust NAPI crate.
      # This ensures TypeScript types match the current Rust code.
      - name: Build NAPI types
        run: |
          cd crates/truffle-napi
          npx napi build --platform --release
          echo "Generated types:"
          head -20 index.d.ts

      - name: Build TypeScript packages
        run: |
          pnpm --filter @vibecook/truffle run build
          pnpm --filter @vibecook/truffle-react run build

      # Wait for @vibecook/truffle-native to be available on npm.
      # The NAPI build workflow publishes it, but takes ~10 min.
      - name: Wait for @vibecook/truffle-native
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "Waiting for @vibecook/truffle-native@${VERSION} on npm..."
          for i in $(seq 1 30); do
            if npm view "@vibecook/truffle-native@${VERSION}" version 2>/dev/null; then
              echo "Found @vibecook/truffle-native@${VERSION}"
              exit 0
            fi
            echo "Attempt $i/30 — not yet available, waiting 30s..."
            sleep 30
          done
          echo "::warning::@vibecook/truffle-native@${VERSION} not found after 15 min. Publishing anyway."

      - name: Publish @vibecook/truffle
        run: |
          cd packages/core
          npm publish --provenance --access public --registry https://registry.npmjs.org --ignore-scripts

      - name: Wait for @vibecook/truffle to be indexed
        run: sleep 30

      - name: Publish @vibecook/truffle-react
        run: |
          cd packages/react
          npm publish --provenance --access public --registry https://registry.npmjs.org --ignore-scripts
