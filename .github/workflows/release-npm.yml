name: Publish @vibecook/truffle to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish @vibecook/truffle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v5

      - name: Install pnpm
        run: npm install -g pnpm@10.20.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v5
        with:
          node-version: 24
          cache: pnpm

      - name: Pin checksums for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME##*v}"
          mkdir -p /tmp/sidecar-assets
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --pattern 'tsnet-sidecar-*' \
            --dir /tmp/sidecar-assets
          node scripts/update-sidecar-checksums.mjs "${VERSION}" /tmp/sidecar-assets
          node scripts/check-release-versions.mjs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Print npm version
        run: |
          echo "npm version: $(npm --version)"

      - name: Wait for sidecar packages
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          packages=(
            "@vibecook/truffle-sidecar-darwin-arm64"
            "@vibecook/truffle-sidecar-darwin-x64"
            "@vibecook/truffle-sidecar-linux-arm64"
            "@vibecook/truffle-sidecar-linux-x64"
            "@vibecook/truffle-sidecar-win32-x64"
          )
          for pkg in "${packages[@]}"; do
            echo "Waiting for ${pkg}@${VERSION} on npm..."
            for i in $(seq 1 30); do
              if npm view "${pkg}@${VERSION}" version 2>/dev/null; then
                echo "Found ${pkg}@${VERSION}"
                continue 2
              fi
              echo "Attempt $i/30 - not yet available, waiting 30s..."
              sleep 30
            done
            echo "::error::${pkg}@${VERSION} not found after 15 min."
            exit 1
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate fresh index.d.ts and index.js from the Rust NAPI crate.
      # This ensures TypeScript types match the current Rust code.
      - name: Build NAPI types
        run: |
          cd crates/truffle-napi
          npx napi build --platform --release
          echo "Generated types:"
          head -20 index.d.ts

      - name: Build TypeScript packages
        run: |
          pnpm --filter @vibecook/truffle run build
          pnpm --filter @vibecook/truffle-react run build

      # Wait for @vibecook/truffle-native to be available on npm.
      # The NAPI build workflow publishes it, but takes ~10 min.
      - name: Wait for @vibecook/truffle-native
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "Waiting for @vibecook/truffle-native@${VERSION} on npm..."
          for i in $(seq 1 30); do
            if npm view "@vibecook/truffle-native@${VERSION}" version 2>/dev/null; then
              echo "Found @vibecook/truffle-native@${VERSION}"
              exit 0
            fi
            echo "Attempt $i/30 — not yet available, waiting 30s..."
            sleep 30
          done
          echo "::error::@vibecook/truffle-native@${VERSION} not found after 15 min."
          exit 1

      # Use `pnpm publish`, not `npm publish`, so that `workspace:*`
      # dependency specifiers get rewritten to concrete version ranges in
      # the published package.json. `npm publish` leaves them as literal
      # "workspace:*", which makes the package uninstallable outside the
      # monorepo (npm/yarn can't resolve that protocol).
      - name: Publish @vibecook/truffle
        run: |
          cd packages/core
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_ERROR=$(mktemp)
          if npm view "@vibecook/truffle@${VERSION}" version >/dev/null 2>"$NPM_VIEW_ERROR"; then
            echo "@vibecook/truffle@${VERSION} is already published; skipping."
          elif ! grep -q 'E404' "$NPM_VIEW_ERROR"; then
            cat "$NPM_VIEW_ERROR" >&2
            echo "::error::Could not determine npm publication state; refusing to publish blindly."
            exit 1
          else
            pnpm publish --provenance --access public --registry https://registry.npmjs.org --ignore-scripts --no-git-checks
          fi

      - name: Wait for @vibecook/truffle to be indexed
        run: sleep 30

      - name: Publish @vibecook/truffle-react
        run: |
          cd packages/react
          VERSION=$(node -p "require('./package.json').version")
          NPM_VIEW_ERROR=$(mktemp)
          if npm view "@vibecook/truffle-react@${VERSION}" version >/dev/null 2>"$NPM_VIEW_ERROR"; then
            echo "@vibecook/truffle-react@${VERSION} is already published; skipping."
          elif ! grep -q 'E404' "$NPM_VIEW_ERROR"; then
            cat "$NPM_VIEW_ERROR" >&2
            echo "::error::Could not determine npm publication state; refusing to publish blindly."
            exit 1
          else
            pnpm publish --provenance --access public --registry https://registry.npmjs.org --ignore-scripts --no-git-checks
          fi
