name: Release CLI Binaries

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: darwin-arm64
            os: macos-latest
            rust_target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            cli_bin: truffle
            sidecar_bin: sidecar-slim
            archive: truffle-darwin-arm64.tar.gz
            archive_cmd: tar czf

          # macOS Intel
          - platform: darwin-x64
            os: macos-latest
            rust_target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            cli_bin: truffle
            sidecar_bin: sidecar-slim
            archive: truffle-darwin-x64.tar.gz
            archive_cmd: tar czf

          # Linux x64 (musl — statically linked, works on any Linux distro)
          - platform: linux-x64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            goos: linux
            goarch: amd64
            cli_bin: truffle
            sidecar_bin: sidecar-slim
            archive: truffle-linux-x64.tar.gz
            archive_cmd: tar czf

          # Linux ARM64 (cross-compiled, gnu — musl cross-compile needs extra tooling)
          - platform: linux-arm64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            goos: linux
            goarch: arm64
            cli_bin: truffle
            sidecar_bin: sidecar-slim
            archive: truffle-linux-arm64.tar.gz
            archive_cmd: tar czf
            cross: true

          # Windows x64
          - platform: win32-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            cli_bin: truffle.exe
            sidecar_bin: sidecar-slim.exe
            archive: truffle-win32-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Go toolchain
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: '1.25'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Install musl toolchain (Linux x64)
        if: matrix.rust_target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools

      - name: Build Rust CLI
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --package truffle-cli --target ${{ matrix.rust_target }}

      - name: Build Go sidecar
        working-directory: packages/sidecar-slim
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w -X main.Version=${{ github.ref_name }}" \
            -o "${{ matrix.sidecar_bin }}" .

      - name: Prepare staging directory
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.cli_bin }}" staging/
          cp "packages/sidecar-slim/${{ matrix.sidecar_bin }}" staging/

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows' && !matrix.cross
        run: |
          strip staging/${{ matrix.cli_bin }}

      - name: Strip binaries (Linux ARM64 cross)
        if: matrix.cross
        run: |
          aarch64-linux-gnu-strip staging/${{ matrix.cli_bin }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd staging
          chmod +x ${{ matrix.cli_bin }} ${{ matrix.sidecar_bin }}
          tar czf ../${{ matrix.archive }} ${{ matrix.cli_bin }} ${{ matrix.sidecar_bin }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd staging
          7z a ../${{ matrix.archive }} ${{ matrix.cli_bin }} ${{ matrix.sidecar_bin }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ matrix.archive }}" --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v5
        with:
          name: truffle-${{ matrix.platform }}
          path: ${{ matrix.archive }}
          if-no-files-found: error
