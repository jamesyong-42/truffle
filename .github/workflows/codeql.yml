name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go]
        include:
          - language: go
            build-command: |
              cd packages/sidecar-slim
              go build ./...

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@28ef790fc820e77db30cb6f41509e8e813e0960c # v3
        with:
          languages: ${{ matrix.language }}

      - name: Install Go toolchain
        if: matrix.language == 'go'
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6
        with:
          go-version: '1.25'
          cache-dependency-path: packages/sidecar-slim/go.sum

      - name: Build (Go)
        if: matrix.language == 'go'
        working-directory: packages/sidecar-slim
        env:
          CGO_ENABLED: '0'
        run: go build ./...

      - name: Autobuild
        if: matrix.language != 'go'
        uses: github/codeql-action/autobuild@28ef790fc820e77db30cb6f41509e8e813e0960c # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@28ef790fc820e77db30cb6f41509e8e813e0960c # v3
        with:
          category: "/language:${{ matrix.language }}"
