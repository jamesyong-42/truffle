name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@a02a34c4f4de3bc0a52b15e5e84b6e21f65e8b08 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # When a release is created, dispatch the build workflows
      # (GITHUB_TOKEN releases don't trigger 'release: created' events)
      - name: Trigger CLI build
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-cli.yml --repo "${{ github.repository }}" --ref "${{ steps.release.outputs.tag_name }}"

      - name: Trigger sidecar build
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-sidecar.yml --repo "${{ github.repository }}" --ref "${{ steps.release.outputs.tag_name }}"

      - name: Trigger crates.io publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-crates.yml --repo "${{ github.repository }}" --ref "${{ steps.release.outputs.tag_name }}"

      - name: Trigger NAPI build and publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run napi-build.yml --repo "${{ github.repository }}" --ref "${{ steps.release.outputs.tag_name }}"

      - name: Trigger npm publish (@vibecook/truffle)
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-npm.yml --repo "${{ github.repository }}" --ref "${{ steps.release.outputs.tag_name }}"
