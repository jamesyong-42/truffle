# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# Exclude workspace members that need platform-specific tooling (GTK, NAPI).
# These bring large transitive dependency trees with unmaintained crates
# and exotic licenses that are irrelevant to the core library.
[graph]
exclude = ["truffle-tauri-plugin", "truffle-napi"]

# Advisories — all advisories are denied by default in modern cargo-deny.
# Use `ignore` to suppress specific advisories with justification.
[advisories]
ignore = [
    # atomic-polyfill is a transitive dep via heapless → postcard → loro-internal.
    # No safe upgrade available; awaiting upstream fix.
    { id = "RUSTSEC-2023-0089", reason = "transitive dep via loro; no upgrade path yet" },
]

# Licenses — only explicitly allowed licenses pass; everything else is denied.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
